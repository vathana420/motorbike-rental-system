<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse | MotoRent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #2563EB; --primary-dark: #1D4ED8; --dark: #1E293B; --gray: #64748B; --light: #F8FAFC; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--light); }
        .topnav { background: #fff; padding: 0.85rem 2rem; box-shadow: 0 1px 0 #E2E8F0; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .brand { font-size: 1.2rem; font-weight: 700; color: var(--primary); text-decoration: none; }
        .brand span { color: var(--dark); }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--gray); font-weight: 500; font-size: 0.9rem; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }
        .user-pill { background: #EFF6FF; color: var(--primary); padding: 0.35rem 0.9rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .section { padding: 2.5rem 2rem; max-width: 1200px; margin: 0 auto; }
        .page-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
        .bike-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; height: 100%; }
        .bike-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(37,99,235,0.12); }
        .bike-img { height: 180px; background: linear-gradient(135deg, #DBEAFE, #EFF6FF); display: flex; align-items: center; justify-content: center; }
        .bike-img i { font-size: 4rem; color: var(--primary); opacity: 0.7; }
        .bike-body { padding: 1.25rem; }
        .bike-title { font-weight: 700; font-size: 1rem; margin-bottom: 0.25rem; }
        .bike-meta { font-size: 0.82rem; color: var(--gray); margin-bottom: 0.5rem; }
        .bike-desc { font-size: 0.85rem; color: var(--gray); margin-bottom: 0.75rem; min-height: 2.5rem; overflow: hidden; }
        .bike-price { font-size: 1.1rem; font-weight: 700; color: var(--primary); }
        .bike-price span { font-size: 0.8rem; font-weight: 400; color: var(--gray); }
        .btn-book { background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 0.5rem 1.2rem; font-weight: 600; font-size: 0.875rem; text-decoration: none; display: block; text-align: center; margin-top: 0.75rem; }
        .btn-book:hover { background: var(--primary-dark); color: #fff; }
        .badge-avail { background: #DCFCE7; color: #166534; font-size: 0.72rem; padding: 0.25em 0.6em; border-radius: 20px; font-weight: 600; }
    </style>
</head>
<body>
<nav class="topnav">
    <a href="/customer/home" class="brand"><i class="bi bi-bicycle me-1"></i>Moto<span>Rent</span></a>
    <div class="nav-links">
        <a href="/customer/home">Home</a>
        <a href="/customer/browse" class="active">Browse</a>
        <a href="/customer/my-bookings">My Bookings</a>
        <div class="user-pill"><i class="bi bi-person-fill me-1"></i><span th:text="${userName}">User</span></div>
        <a href="/logout" style="color:#E11D48;font-weight:600;"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
    </div>
</nav>

<div class="section">
    <div class="page-title">Browse Available Motorbikes</div>
    <p class="text-muted mb-4" style="font-size:0.875rem;">All motorbikes available for rental right now</p>

    <div class="row g-3" th:if="${!#lists.isEmpty(motorbikes)}">
        <div class="col-md-4 col-lg-3" th:each="bike : ${motorbikes}">
            <div class="bike-card">
                <div class="bike-img">
                    <img th:if="${bike.imageUrl != null and !bike.imageUrl.isEmpty()}"
                         th:src="${bike.imageUrl}" alt="bike" style="width:100%;height:100%;object-fit:cover;">
                    <i th:unless="${bike.imageUrl != null and !bike.imageUrl.isEmpty()}" class="bi bi-bicycle"></i>
                </div>
                <div class="bike-body">
                    <div class="d-flex justify-content-between align-items-start mb-1">
                        <div class="bike-title" th:text="${bike.brandModel}"></div>
                        <span class="badge-avail">Available</span>
                    </div>
                    <div class="bike-meta" th:text="${bike.year} + ' · ' + ${bike.color} + ' · ' + ${bike.plateNumber}"></div>
                    <div class="bike-desc" th:text="${bike.description}"></div>
                    <div class="bike-price">$<span th:text="${bike.pricePerDay}"></span> <span>/day</span></div>
                    <a th:href="@{/customer/book/{id}(id=${bike.id})}" class="btn-book">
                        <i class="bi bi-calendar-plus me-1"></i> Book Now
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(motorbikes)}" class="text-center py-5 text-muted">
        <i class="bi bi-bicycle display-4 d-block mb-3 opacity-50"></i>
        <p class="mb-0">No motorbikes available at the moment. Please check back later.</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
