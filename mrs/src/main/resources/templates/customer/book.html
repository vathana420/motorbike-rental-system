<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Motorbike | MotoRent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #2563EB; --primary-dark: #1D4ED8; --dark: #1E293B; --gray: #64748B; --light: #F8FAFC; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--light); }
        .topnav { background: #fff; padding: 0.85rem 2rem; box-shadow: 0 1px 0 #E2E8F0; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .brand { font-size: 1.2rem; font-weight: 700; color: var(--primary); text-decoration: none; }
        .brand span { color: var(--dark); }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--gray); font-weight: 500; font-size: 0.9rem; }
        .nav-links a.active, .nav-links a:hover { color: var(--primary); }
        .user-pill { background: #EFF6FF; color: var(--primary); padding: 0.35rem 0.9rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .section { padding: 2.5rem 2rem; max-width: 720px; margin: 0 auto; }
        .book-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; }
        .bike-banner { background: linear-gradient(135deg, #1E293B 0%, #2563EB 100%); color: #fff; padding: 2rem; display: flex; align-items: center; gap: 1.5rem; }
        .bike-banner i { font-size: 3rem; opacity: 0.8; }
        .bike-banner .bike-name { font-size: 1.4rem; font-weight: 700; }
        .bike-banner .bike-info { opacity: 0.8; font-size: 0.9rem; margin-top: 0.25rem; }
        .price-tag { background: rgba(255,255,255,0.2); padding: 0.4rem 0.9rem; border-radius: 20px; font-weight: 700; margin-top: 0.5rem; display: inline-block; }
        .form-section { padding: 2rem; }
        .form-label { font-size: 0.875rem; font-weight: 600; color: var(--dark); }
        .form-control { border-radius: 8px; border: 1.5px solid #E2E8F0; padding: 0.6rem 0.9rem; font-size: 0.95rem; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
        .btn-book { background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 0.7rem 2rem; font-weight: 600; font-size: 0.95rem; width: 100%; }
        .btn-book:hover { background: var(--primary-dark); }
        .price-preview { background: #EFF6FF; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; font-size: 0.875rem; }
        .price-preview .total { font-size: 1.3rem; font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>
<nav class="topnav">
    <a href="/customer/home" class="brand"><i class="bi bi-bicycle me-1"></i>Moto<span>Rent</span></a>
    <div class="nav-links">
        <a href="/customer/home">Home</a>
        <a href="/customer/browse" class="active">Browse</a>
        <a href="/customer/my-bookings">My Bookings</a>
        <div class="user-pill"><i class="bi bi-person-fill me-1"></i><span th:text="${userName}">User</span></div>
        <a href="/logout" style="color:#E11D48;font-weight:600;"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
    </div>
</nav>

<div class="section">
    <div class="mb-3">
        <a href="/customer/browse" class="text-decoration-none text-muted" style="font-size:0.875rem;">
            <i class="bi bi-arrow-left me-1"></i> Back to Browse
        </a>
    </div>

    <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:1.5rem;">Book a Motorbike</h1>

    <div class="book-card">
        <!-- Bike Banner -->
        <div class="bike-banner">
            <i class="bi bi-bicycle"></i>
            <div>
                <div class="bike-name" th:text="${motorbike.brandModel}">Honda Wave</div>
                <div class="bike-info" th:text="${motorbike.year} + ' · ' + ${motorbike.color} + ' · ' + ${motorbike.plateNumber}"></div>
                <div class="price-tag">$<span th:text="${motorbike.pricePerDay}"></span> / day</div>
            </div>
        </div>

        <!-- Booking Form -->
        <div class="form-section">
            <div class="price-preview">
                <div class="text-muted mb-1" style="font-size:0.8rem;">ESTIMATED TOTAL</div>
                <div class="total" id="totalPrice">$0.00</div>
                <div class="text-muted" style="font-size:0.8rem;" id="dayCount">Select dates to calculate</div>
            </div>

            <form th:action="@{/customer/book/{id}(id=${motorbike.id})}" method="post">
                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label">Start Date</label>
                        <input type="date" id="startDate" name="startDate" class="form-control"
                               th:min="${today}" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label">End Date</label>
                        <input type="date" id="endDate" name="endDate" class="form-control"
                               th:min="${today}" required>
                    </div>
                </div>

                <button type="submit" class="btn-book">
                    <i class="bi bi-check-circle-fill me-2"></i>Confirm Booking
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    const pricePerDay = [[${motorbike.pricePerDay}]];
    const startInput = document.getElementById('startDate');
    const endInput = document.getElementById('endDate');
    const totalEl = document.getElementById('totalPrice');
    const dayEl = document.getElementById('dayCount');

    function calcPrice() {
        const s = new Date(startInput.value);
        const e = new Date(endInput.value);
        if (startInput.value && endInput.value && e > s) {
            const days = Math.ceil((e - s) / (1000*60*60*24));
            const total = (days * pricePerDay).toFixed(2);
            totalEl.textContent = '$' + total;
            dayEl.textContent = days + ' day(s) × $' + pricePerDay + '/day';
            // set end date min
            endInput.min = startInput.value;
        } else {
            totalEl.textContent = '$0.00';
            dayEl.textContent = 'Select valid dates to calculate';
        }
    }
    startInput.addEventListener('change', () => { endInput.min = startInput.value; calcPrice(); });
    endInput.addEventListener('change', calcPrice);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
