<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MotoRent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563EB;
            --primary-dark: #1D4ED8;
            --dark: #1E293B;
            --gray: #64748B;
            --light: #F8FAFC;
        }
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(37,99,235,0.10);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
        }
        .brand-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
        }
        .brand-logo span { color: var(--dark); }
        .form-label { font-size: 0.875rem; font-weight: 600; color: var(--dark); }
        .form-control {
            border-radius: 8px;
            border: 1.5px solid #E2E8F0;
            padding: 0.6rem 0.9rem;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }
        .btn-primary {
            background: var(--primary);
            border: none;
            border-radius: 8px;
            padding: 0.65rem;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .role-selector .form-check-input:checked { background-color: var(--primary); border-color: var(--primary); }
        .divider { color: var(--gray); font-size: 0.85rem; }
        .alert-danger { border-radius: 8px; font-size: 0.875rem; }
        .alert-success { border-radius: 8px; font-size: 0.875rem; }
    </style>
</head>
<body>
<div class="auth-card">
    <!-- Brand -->
    <div class="text-center mb-4">
        <div class="brand-logo"><i class="bi bi-bicycle"></i> Moto<span>Rent</span></div>
        <p class="text-muted mt-1 mb-0" style="font-size:0.9rem;">Sign in to your account</p>
    </div>

    <!-- Success message after register -->
    <div th:if="${param.registered}" class="alert alert-success py-2">
        <i class="bi bi-check-circle-fill me-1"></i> Registration successful! Please log in.
    </div>

    <!-- Error message -->
    <div th:if="${error}" class="alert alert-danger py-2">
        <i class="bi bi-exclamation-circle-fill me-1"></i>
        <span th:text="${error}"></span>
    </div>

    <!-- Login Form -->
    <form th:action="@{/login}" method="post">
        <!-- Login As -->
        <div class="mb-3">
            <label class="form-label">Login As</label>
            <div class="role-selector d-flex gap-3">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="loginAs" id="roleCustomer"
                           value="CUSTOMER" checked>
                    <label class="form-check-label" for="roleCustomer">
                        <i class="bi bi-person-fill me-1"></i> Customer
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="loginAs" id="roleAdmin"
                           value="ADMIN">
                    <label class="form-check-label" for="roleAdmin">
                        <i class="bi bi-shield-fill me-1"></i> Administrator
                    </label>
                </div>
            </div>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-control"
                   placeholder="you@example.com" required>
        </div>

        <!-- Password -->
        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control"
                   placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
        </button>
    </form>

    <!-- Register Link (customers only) -->
    <div class="text-center mt-4 divider">
        Don't have an account?
        <a th:href="@{/register}" class="text-decoration-none fw-semibold" style="color:var(--primary);">
            Register here
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
