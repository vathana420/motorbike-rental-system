<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MotoRent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #2563EB; --primary-dark: #1D4ED8; --dark: #1E293B; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 2rem 1rem;
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(37,99,235,0.10);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 480px;
        }
        .brand-logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .brand-logo span { color: var(--dark); }
        .form-label { font-size: 0.875rem; font-weight: 600; color: var(--dark); }
        .form-control, .form-select {
            border-radius: 8px;
            border: 1.5px solid #E2E8F0;
            padding: 0.6rem 0.9rem;
            font-size: 0.95rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }
        .btn-primary {
            background: var(--primary); border: none; border-radius: 8px;
            padding: 0.65rem; font-weight: 600;
        }
        .btn-primary:hover { background: var(--primary-dark); }
        .section-divider {
            font-size: 0.8rem; font-weight: 700; color: #94A3B8;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="text-center mb-4">
        <div class="brand-logo"><i class="bi bi-bicycle"></i> Moto<span>Rent</span></div>
        <p class="text-muted mt-1 mb-0" style="font-size:0.9rem;">Create your customer account</p>
    </div>

    <!-- Error -->
    <div th:if="${error}" class="alert alert-danger py-2" style="border-radius:8px;font-size:.875rem;">
        <i class="bi bi-exclamation-circle-fill me-1"></i>
        <span th:text="${error}"></span>
    </div>

    <!-- Register Form -->
    <form th:action="@{/register}" th:object="${customer}" method="post">

        <p class="section-divider mb-2">Personal Info</p>

        <div class="row g-3 mb-3">
            <div class="col-6">
                <label class="form-label">First Name</label>
                <input type="text" class="form-control" th:field="*{firstName}"
                       placeholder="Dara" required>
            </div>
            <div class="col-6">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-control" th:field="*{lastName}"
                       placeholder="Chan" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-select" th:field="*{gender}" required>
                <option value="">Select gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" class="form-control" th:field="*{phone}"
                   placeholder="012 345 678" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Address</label>
            <input type="text" class="form-control" th:field="*{address}"
                   placeholder="Phnom Penh, Cambodia" required>
        </div>

        <p class="section-divider mb-2 mt-3">Account Info</p>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" th:field="*{email}"
                   placeholder="you@example.com" required>
        </div>

        <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" th:field="*{password}"
                   placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-person-plus-fill me-1"></i> Create Account
        </button>
    </form>

    <div class="text-center mt-3" style="font-size:0.875rem; color:#64748B;">
        Already have an account?
        <a th:href="@{/login}" class="text-decoration-none fw-semibold" style="color:var(--primary);">Sign in</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>ml>
