<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers | MotoRent Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #2563EB; --dark: #1E293B; --sidebar-w: 240px; --gray: #64748B; --light: #F8FAFC; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--light); display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-w); background: var(--dark); color: #fff; display: flex; flex-direction: column; position: fixed; height: 100vh; padding: 1.5rem 1rem; z-index: 100; }
        .sidebar-brand { font-size: 1.2rem; font-weight: 700; color: #fff; padding: 0.5rem 0 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 0.25rem; padding-top: 1rem; }
        .nav-item { display: flex; align-items: center; padding: 0.6rem 0.8rem; border-radius: 8px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.9rem; font-weight: 500; }
        .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .nav-item.active { background: var(--primary); color: #fff; }
        .sidebar-footer { padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); }
        .main { margin-left: var(--sidebar-w); flex: 1; padding: 2rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .card-header { background: #fff; border-bottom: 1px solid #F1F5F9; padding: 1rem 1.5rem; border-radius: 12px 12px 0 0 !important; }
        .table th { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray); font-weight: 600; border: none; }
        .table td { font-size: 0.9rem; vertical-align: middle; border-color: #F1F5F9; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: #EFF6FF; color: #2563EB; font-weight: 700; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; }
        .btn-sm { padding: 0.3rem 0.65rem; font-size: 0.8rem; border-radius: 6px; border: none; font-weight: 600; }
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-brand"><i class="bi bi-bicycle me-2"></i>MotoRent <span class="badge bg-primary ms-1" style="font-size:0.6rem;">Admin</span></div>
    <nav class="sidebar-nav">
        <a href="/admin/dashboard" class="nav-item"><i class="bi bi-grid-fill me-2"></i> Dashboard</a>
        <a href="/admin/motorbikes" class="nav-item"><i class="bi bi-bicycle me-2"></i> Motorbikes</a>
        <a href="/admin/bookings" class="nav-item"><i class="bi bi-calendar-check-fill me-2"></i> Bookings</a>
        <a href="/admin/customers" class="nav-item active"><i class="bi bi-people-fill me-2"></i> Customers</a>
    </nav>
    <div class="sidebar-footer">
        <a href="/logout" class="nav-item" style="color:#FCA5A5;"><i class="bi bi-box-arrow-left me-2"></i> Logout</a>
    </div>
</aside>

<main class="main">
    <div style="margin-bottom:2rem;">
        <h1 style="font-size:1.5rem; font-weight:700;">Customer Management</h1>
        <p class="text-muted mb-0" style="font-size:0.875rem;">View and manage registered customers</p>
    </div>

    <div class="card">
        <div class="card-header">
            <h5 class="mb-0"><i class="bi bi-people-fill me-2 text-primary"></i>All Customers</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">#</th>
                        <th>Customer</th>
                        <th>Email</th>
                        <th>Gender</th>
                        <th>Phone</th>
                        <th>Address</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="customer : ${customers}">
                        <td class="ps-4 text-muted" th:text="${customer.id}"></td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="avatar" th:text="${customer.firstName.substring(0,1) + customer.lastName.substring(0,1)}"></div>
                                <div>
                                    <div class="fw-semibold" th:text="${customer.fullName}"></div>
                                    <div class="text-muted" style="font-size:0.78rem;">Customer</div>
                                </div>
                            </div>
                        </td>
                        <td th:text="${customer.email}"></td>
                        <td th:text="${customer.gender}"></td>
                        <td th:text="${customer.phone}"></td>
                        <td th:text="${customer.address}"></td>
                        <td>
                            <a th:href="@{/admin/customers/delete/{id}(id=${customer.id})}"
                               class="btn btn-sm" style="background:#FEE2E2;color:#991B1B;"
                               onclick="return confirm('Delete this customer?')">
                                <i class="bi bi-trash-fill"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(customers)}">
                        <td colspan="7" class="text-center py-5 text-muted">
                            <i class="bi bi-person-x display-6 d-block mb-2"></i>
                            No customers registered yet.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
